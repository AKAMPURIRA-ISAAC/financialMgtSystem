name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache buildozer cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libffi-dev libssl-dev python3-dev libjpeg-dev zlib1g-dev \
          android-sdk android-sdk-build-tools
        
    - name: Set Android environment
      run: |
        echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "PATH=/usr/lib/android-sdk/build-tools/34.0.0:$PATH" >> $GITHUB_ENV
        
    - name: Accept Android SDK licenses
      run: |
        # Create license acceptance directory
        mkdir -p ~/.android/licenses
        
        # Accept all Android SDK licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131b33910" >> ~/.android/licenses/android-sdk-license
        
        # Accept Google Play Services license
        echo "e3c4a1885c25bfc95fa40e0e885f27c7ac9a0b76" > ~/.android/licenses/gplay-services-license
        
        # Accept Android SDK Preview license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/licenses/android-sdk-preview-license
        
        ls -la ~/.android/licenses/
        
    - name: Prepare build directory
      run: |
        mkdir -p ~/.buildozer/android/platform
        
    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer cython
        
    - name: Verify buildozer
      run: |
        buildozer --version
        python -c "import buildozer; print(f'Buildozer path: {buildozer.__file__}')"
        
    - name: Create buildozer cache directory
      run: |
        mkdir -p ~/.buildozer
        mkdir -p ~/.buildozer/android
        ls -la ~/.buildozer/
        
    - name: Check environment
      run: |
        echo "Java version:"
        java -version
        echo ""
        echo "Android SDK:"
        ls -la /usr/lib/android-sdk/
        echo ""
        echo "Build tools:"
        ls -la /usr/lib/android-sdk/build-tools/ || echo "Build-tools not found yet"
        
    - name: Build Android APK (Debug)
      run: |
        cd ${{ github.workspace }}
        pwd
        ls -la
        buildozer android debug 2>&1 | tee build.log
        BUILD_EXIT=$?
        echo "Build exit code: $BUILD_EXIT"
        exit $BUILD_EXIT
        
    - name: Check build directory on failure
      if: failure()
      run: |
        echo "=== Build Log (Last 200 lines) ==="
        tail -200 build.log || echo "No build.log found"
        echo ""
        echo "=== Buildozer logs ==="
        ls -lah .buildozer/android/platform/build-*/ 2>/dev/null || echo "No build dirs"
        find .buildozer -name "*.log" -type f -exec echo "=== {} ===" \; -exec tail -50 {} \; 2>/dev/null || true
        echo ""
        echo "=== Python/Cython compilation errors ==="
        find .buildozer -name "*.c" -o -name "*.o" | head -20
        echo ""
        echo "=== Check bin directory ==="
        ls -lah bin/ || echo "No bin directory"
    - name: Check for APK artifacts
      if: always()
      run: |
        echo "=== Checking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo ""
        echo "=== Bin directory contents ==="
        ls -lah bin/ 2>/dev/null || mkdir -p bin && ls -lah bin/
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-apk
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: warn
        
    - name: Create Release with APK
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: build-${{ github.run_number }}
        body: |
          # Finance Pro 2.0 Android Build #${{ github.run_number }}
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          
          **Download and Install:**
          ```bash
          adb install app-*.apk
          ```
