name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev python3-dev libjpeg-dev zlib1g-dev
        
    - name: Create buildozer.spec
      run: |
        # Ensure buildozer.spec exists with correct format
        if [ ! -f "buildozer.spec" ]; then
          buildozer init --default
        fi
        
    - name: Build debug APK
      run: |
        buildozer android debug
      if: github.event.inputs.build_type != 'release'
      
    - name: Build release APK
      run: |
        buildozer android release
      if: github.event.inputs.build_type == 'release'
      
    - name: Check build output
      run: |
        ls -lah bin/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: bin/*.apk
        retention-days: 30
        
    - name: Create Release
      uses: ncipollo/release-action@v1.14.0
      if: success()
      with:
        artifacts: "bin/*.apk"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "release-${{ github.run_number }}-${{ github.event.inputs.build_type }}"
        body: |
          # Finance Pro 2.0 - Android Build
          
          Build Number: ${{ github.run_number }}
          Build Type: ${{ github.event.inputs.build_type || 'debug' }}
          Commit: ${{ github.sha }}
          
          ## Download APK
          Download the APK file from the assets below and install on your Android phone.
          
          ### Installation Steps:
          1. Enable Developer Mode on your phone
          2. Enable USB Debugging
          3. Connect phone via USB
          4. Run: `adb install app-*.apk`
          
          ### Release Notes
          - Full Finance Pro 2.0 features
          - Machine Learning predictions
          - Anomaly detection
          - Auto-categorization
          - Multi-currency support
