name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libffi-dev libssl-dev python3-dev libjpeg-dev zlib1g-dev \
          android-sdk android-sdk-build-tools
        
    - name: Set Android environment
      run: |
        echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "PATH=/usr/lib/android-sdk/build-tools/34.0.0:$PATH" >> $GITHUB_ENV
        
    - name: Accept Android SDK licenses
      run: |
        yes | sudo /usr/lib/android-sdk/tools/bin/sdkmanager --licenses || true
        yes | sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer cython
        
    - name: Verify buildozer
      run: |
        buildozer --version
        python -c "import buildozer; print(f'Buildozer path: {buildozer.__file__}')"
        
    - name: Create buildozer cache directory
      run: |
        mkdir -p ~/.buildozer
        mkdir -p ~/.buildozer/android
        ls -la ~/.buildozer/
        
    - name: Check environment
      run: |
        echo "Java version:"
        java -version
        echo ""
        echo "Android SDK:"
        ls -la /usr/lib/android-sdk/
        echo ""
        echo "Build tools:"
        ls -la /usr/lib/android-sdk/build-tools/ || echo "Build-tools not found yet"
        
    - name: Build Android APK (Debug)
      run: |
        buildozer android debug 2>&1
        
    - name: List build outputs
      run: |
        ls -lah bin/
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-apk
        path: bin/*.apk
        retention-days: 30
        
    - name: Create Release with APK
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: build-${{ github.run_number }}
        body: |
          # Finance Pro 2.0 Android Build #${{ github.run_number }}
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          
          **Download and Install:**
          ```bash
          adb install app-*.apk
          ```
